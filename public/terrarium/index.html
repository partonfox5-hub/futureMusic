<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nature Terrarium</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="sky-overlay"></div>
    <canvas id="gameCanvas"></canvas>

    <!-- Left UI: Roster -->
    <div id="roster-panel">
        <h3>Spawn Birds</h3>
        <button onclick="spawnBird('Robin')">Robin</button>
        <button onclick="spawnBird('Blue Jay')">Blue Jay</button>
        <button onclick="spawnBird('Cardinal')">Cardinal</button>
        <hr>
        <div id="custom-roster"></div>
    </div>

   <!-- Top Right UI -->
    <div id="top-right-controls">
        <label><input type="checkbox" id="immortal-toggle"> Immortal Birds</label>
        <button id="pause-btn">Pause</button>
        <button id="chronology-btn">Chronology</button>
    </div>

    <!-- Bottom Left UI -->
    <div id="bottom-left-controls">
        <div id="seed-bag" draggable="true">🌾 Seed</div>
        <div id="feeder-item" draggable="true">🪵 Feeder</div>
        <div id="birdhouse-item" draggable="true">🏡 Birdhouse</div>
        <button id="custom-bird-btn">Make Custom Bird</button>
    </div>
    
    <!-- Retire Nest -->
    <div id="retire-nest">🪹 Retire Bird</div>

    <!-- Bird Info Modal -->
    <div id="bird-modal" class="modal hidden">
        <input type="text" id="bird-name" placeholder="Name">
        <p>Species: <span id="bird-species"></span></p>
        <p>Age: <span id="bird-age"></span> days</p>
        <p id="bird-fact"></p>
        <button onclick="closeModal('bird-modal')">Close</button>
    </div>

 <!-- Custom Bird Maker Modal -->
    <div id="custom-maker-modal" class="modal hidden" style="width: 320px; max-height: 90vh; overflow-y: auto;">
        <h3>Custom Bird Maker</h3>
        <input type="text" id="c-name" placeholder="Species Name"><br>
        <input type="color" id="c-body" value="#888888"> Body Color<br>
        <input type="color" id="c-wing" value="#444444"> Wing Color<br>
        
        <label>Body: <select id="c-body-type"><option value="normal">Normal</option><option value="slim">Slim</option><option value="plump">Plump</option></select></label><br>
        <label>Head: <select id="c-head-type"><option value="smooth">Smooth</option><option value="crested">Crested</option></select></label><br>
        <label>Beak: <select id="c-beak-type"><option value="short">Short</option><option value="long">Long</option><option value="curved">Curved</option></select></label><br>
        <label>Wing: <select id="c-wing-type"><option value="pointed">Pointed</option><option value="rounded">Rounded</option></select></label><br>
        <label>Tail: <select id="c-tail-type"><option value="normal">Normal</option><option value="forked">Forked</option><option value="fan">Fan</option></select></label><br>

        <label>Habit: <select id="c-habit"><option value="normal">Normal</option><option value="branch hog">Branch Hog</option><option value="nocturnal">Nocturnal</option></select></label><br>
        <label>Size: <input type="range" id="c-size" min="0.5" max="2" step="0.1" value="1"></label><br>
        <label>Lifespan: <input type="number" id="c-lifespan" value="3650"></label><br>
        <label>Libido: <input type="range" id="c-libido" min="1" max="10" value="5"></label><br>
        <button onclick="createCustomBird()">Hatch & Add to Roster</button>
        <button onclick="closeModal('custom-maker-modal')">Cancel</button>
    </div>

    <script src="game.js"></script>
    <script src="ui.js"></script>
</body>
</html>
