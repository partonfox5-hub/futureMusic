class Projectile {
        constructor(x, y, tx, ty, weaponStats, owner = null) {
            this.x = x; this.y = y;
            this.owner = owner;
            this.isEnemy = owner instanceof Zombie;
            let dx = tx - x; let dy = ty - y;
            let dist = Math.hypot(dx, dy);
            
            let speed = weaponStats.type === 'rocket' ? 300 : (weaponStats.type === 'shuriken' ? 400 : (weaponStats.type === 'arrow' ? 500 : 700));
            
            let angle = Math.atan2(dy, dx);
            if (weaponStats.spread) {
                angle += (Math.random() - 0.5) * weaponStats.spread;
            }
            
            this.vx = Math.cos(angle) * speed; 
            this.vy = Math.sin(angle) * speed;
            this.active = true;
            this.stats = weaponStats;
            
            let levelBonus = (owner && !this.isEnemy) ? (1 + (owner.level - 1) * 0.01) : 1;
            this.dmg = weaponStats.dmg * (this.isEnemy ? 1 : (1 + 0.10 * upgradesData.unitDamage.level)) * levelBonus;
            
            if (this.owner === player) this.dmg *= player.perks.damageMulti;
            if (this.owner && this.owner.type === 'Spec Ops') this.dmg *= 2.5;

            this.hitZombies = new Set(); 

            if(weaponStats.type === 'rocket') {
                this.targetDist = dist; this.travelled = 0;
            } else if (weaponStats.type === 'flame') {
                this.life = 0.5 + Math.random() * 0.2; 
                this.maxLife = this.life;
                speed = 150 + Math.random() * 50;
                this.vx = Math.cos(angle) * speed; 
                this.vy = Math.sin(angle) * speed;
            }
        }
        update(dt) {
            let moveDist = Math.hypot(this.vx * dt, this.vy * dt);
            this.x += this.vx * dt;
            this.y += this.vy * dt;
            
            if (this.stats.type === 'rocket') {
                this.travelled += moveDist;
                if (this.travelled >= this.targetDist) {
                    this.active = false; this.explode();
                }
            } else if (this.stats.type === 'flame') {
                this.life -= dt;
                if (this.life <= 0) this.active = false;
            } else {
                if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > playableHeight) this.active = false;
            }
        }
   explode() {
            playSound('explosion', 0.6);
            let aoe = this.stats.aoe || 80;
            if (this.isEnemy) {
                let targets = [player, ...units, ...buildings, ...walls];
                targets.forEach(t => {
                    if (Math.hypot(t.x - this.x, t.y - this.y) < aoe) {
                        t.hp -= this.dmg;
                    }
                });
                if (Math.hypot(this.x, this.y - playableHeight) < aoe) state.campHp -= this.dmg;
            } else {
                zombies.forEach(z => {
                    if (Math.hypot(z.x - this.x, z.y - this.y) < aoe) { 
                        let finalDmg = this.dmg;
                        let critProb = (this.owner === player ? player.perks.critChance : 0) + (upgradesData.critChance ? upgradesData.critChance.level * 0.01 : 0);
                        if (Math.random() < critProb) finalDmg *= 10;
                        z.takeDamage(finalDmg);
                        floatingTexts.push(new FloatingText(z.x + (Math.random()*20-10), z.y - 10, `-${Math.floor(finalDmg)}`, '#e74c3c'));
                        playSound('zombie_hit', 0.4, 50);
                        if (z.hp <= 0 && !z.isThrown) {
                            handleZombieDeath(z, this.owner);
                        }
                    }
                });
                zombies = zombies.filter(z => z.hp > 0);
            }
            
            ctx.beginPath(); ctx.arc(this.x, this.y, aoe, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(231, 76, 60, 0.5)'; ctx.fill();
        }
        draw() {
            ctx.beginPath();
            if (this.stats.type === 'rocket') {
                ctx.arc(this.x, this.y, this.stats.id === 'silo_missile' ? 8 : 5, 0, Math.PI * 2);
                ctx.fillStyle = this.stats.id === 'grenade' ? '#2ecc71' : (this.stats.id === 'silo_missile' ? '#c0392b' : '#e74c3c'); ctx.fill();
            } else if (this.stats.type === 'shuriken') {
                ctx.moveTo(this.x, this.y - 4); ctx.lineTo(this.x + 4, this.y);
                ctx.lineTo(this.x, this.y + 4); ctx.lineTo(this.x - 4, this.y);
                ctx.fillStyle = '#bdc3c7'; ctx.fill();
            } else if (this.stats.type === 'arrow') {
                ctx.moveTo(this.x, this.y); 
                ctx.lineTo(this.x - this.vx * 0.03, this.y - this.vy * 0.03);
                ctx.strokeStyle = '#ecf0f1'; ctx.lineWidth = 2; ctx.stroke();
            } else if (this.stats.type === 'flame') {
                let progress = 1 - (this.life / this.maxLife);
                let radius = 5 + progress * 20;
                ctx.arc(this.x, this.y, radius, 0, Math.PI * 2);
                let green = 150 - progress * 150; 
                ctx.fillStyle = `rgba(255, ${green}, 0, ${1 - progress})`; 
                ctx.fill();
            } else {
                ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
                ctx.fillStyle = '#f1c40f'; ctx.fill();
            }
        }
    }
        class Unit {
        constructor(x, y, type) {
            this.x = x; this.y = y; this.type = type;
            this.targetX = x; this.targetY = y;
            this.radius = type === 'Tank' ? 20 : 12;
            this.fireTimer = 0; this.reloadTimer = 0;
            this.color = '#3498db';
            
            this.level = 1;
            this.xp = 0;

            let baseHp = 15; let baseSpeed = 80; this.baseMelee = 5;

            switch(type) {
                case 'Civilian': baseHp = 22.5; baseSpeed = 80; this.weapon = 'civ_pistol'; break;
                case 'Archer': baseHp = 22.5; baseSpeed = 80; this.weapon = 'bow'; this.color = '#16a085'; break;
                case 'Swordsman': baseHp = 67.5; baseSpeed = 100; this.weapon = 'sword'; this.baseMelee = 10; this.color = '#f39c12'; break;
                case 'Samurai': baseHp = 77.625; baseSpeed = 115; this.weapon = 'samurai_sword'; this.baseMelee = 14; this.color = '#c0392b'; break;
                case 'Thug': baseHp = 45; baseSpeed = 100; this.weapon = 'uzi'; this.color = '#8e44ad'; break;
                case 'Infantry': baseHp = 90; baseSpeed = 120; this.weapon = 'ar15'; this.color = '#2ecc71'; break;
                case 'Sniper': baseHp = 60; baseSpeed = 90; this.weapon = 'sniper'; this.color = '#34495e'; break;
                case 'Bazooka': baseHp = 75; baseSpeed = 80; this.weapon = 'bazooka'; this.color = '#e67e22'; break;
                case 'Flamethrower': baseHp = 90; baseSpeed = 90; this.weapon = 'flamethrower'; this.color = '#d35400'; break;
                case 'Tank': baseHp = 300; baseSpeed = 60; this.weapon = 'tank'; this.color = '#7f8c8d'; break;
                case 'Ninja': baseHp = 105; baseSpeed = 180; this.weapon = 'shuriken'; this.baseMelee = 30; this.color = '#111'; break;
                case 'Medic': baseHp = 37.5; baseSpeed = 90; this.weapon = 'medkit'; this.color = '#fff'; break;
                case 'Spec Ops': baseHp = 135; baseSpeed = 150; this.weapon = 'ar15'; this.color = '#2c3e50'; this.baseMelee = 10; break;
            }
            
            this.baseMaxHp = baseHp; this.baseSpeedConfig = baseSpeed;
            this.bonusMelee = 1.0;
            this.bonusAtkSpeed = 1.0;
            this.bonusMoveSpeed = 1.0;
            this.bonusMaxHp = 1.0;
            this.hp = this.currentMaxHp;
            this.clip = this.maxClip;
            this.activeBuilding = null;
            this.swipeTimer = 0;
            this.swipeAngle = 0;
            this.regenTimer = 0;
        }

        gainXp() {
            this.xp++;
            let requiredXp = this.level * 10;
            if (this.xp >= requiredXp) {
                this.xp -= requiredXp;
                this.level++;
                floatingTexts.push(new FloatingText(this.x, this.y - 35, `LEVEL UP!`, '#3498db'));
                playSound('buy_upgrade', 0.5, 50);
                this.hp = this.currentMaxHp; 
            }
        }

  get currentMaxHp() { return this.baseMaxHp * (1 + 0.10 * upgradesData.unitHealth.level) * (1 + (this.level - 1) * 0.01) * this.bonusMaxHp; }
        get currentSpeed() { return this.baseSpeedConfig * (1 + 0.10 * upgradesData.unitSpeed.level) * (1 + (this.level - 1) * 0.01) * this.bonusMoveSpeed; }
        get currentMeleeDmg() { return this.baseMelee * (1 + 0.10 * upgradesData.unitDamage.level) * (1 + (this.level - 1) * 0.01) * 1.25 * this.bonusMelee; }
        
        get fireCooldown() { 
            let cd = (WEAPONS[this.weapon].cd * Math.pow(0.90, upgradesData.fireRate.level) * Math.pow(0.99, this.level - 1)) * (this.isMeleeClass ? 0.75 : 1.0) * this.bonusAtkSpeed; 
            if (this.type === 'Spec Ops') cd /= 1.75;
            return cd;
        }
        
        get reloadTime() { 
            let rt = WEAPONS[this.weapon].reload * Math.pow(0.90, upgradesData.reloadTime.level) * Math.pow(0.99, this.level - 1); 
            if (this.type === 'Spec Ops') rt *= 0.70;
            return rt;
        }
        
        get isMeleeClass() { return this.weapon === 'sword' || this.weapon === 'samurai_sword' || this.type === 'Ninja'; }
        
        get maxClip() {
            let base = WEAPONS[this.weapon].clip;
            let upgradeMulti = 1 + (0.10 * (upgradesData.clipSize ? upgradesData.clipSize.level : 0));
            return WEAPONS[this.weapon].noAmmo ? base : Math.ceil(base * upgradeMulti);
        }

       update(dt) {
            if (this.swipeTimer > 0) this.swipeTimer -= dt;

            if (upgradesData.regen.level > 0 && this.hp < this.currentMaxHp) {
                this.hp = Math.min(this.currentMaxHp, this.hp + (this.currentMaxHp * (upgradesData.regen.level * 0.001) * dt));
            }

            if (this.isMeleeClass) {
                this.regenTimer += dt;
                if (this.regenTimer >= 5.0) {
                    this.hp = Math.min(this.currentMaxHp, this.hp + 1);
                    this.regenTimer = 0;
                }
            }

            let closestZ = null; let minDz = Infinity;
            zombies.forEach(z => {
                if(z.isThrown) return;
                let d = Math.hypot(z.x - this.x, z.y - this.y);
                if(d < minDz) { minDz = d; closestZ = z; }
            });

   let moveDx = 0, moveDy = 0;
            let kiting = false;
            let inBuildingCurrently = buildings.some(b => Math.hypot(this.x - b.x, this.y - b.y) < b.radius + 5 && (b.type === 'Tower' || b.type === 'Bunker' || b.type === 'Sparring'));

            if (this.type === 'Tank') {
                this.targetY = playableHeight / 2;
                if (!this.patrolDir) this.patrolDir = 1;
                this.targetX = this.x + this.patrolDir * 100;
                if (this.x >= canvas.width - this.radius - 10) this.patrolDir = -1;
                if (this.x <= this.radius + 10) this.patrolDir = 1;
            }
            let buildingToBuild = null;

            let wStats = WEAPONS[this.weapon];
            let range = wStats.type === 'rocket' ? 400 : (wStats.type === 'shuriken' ? 150 : (wStats.type === 'flame' ? 120 : 300));
            if (this.weapon === 'sniper') range = 600;
            range *= (1 + 0.10 * upgradesData.unitRange.level);
            if (this.type === 'Spec Ops') range *= 1.25;

            let pickupRange = this.type === 'Civilian' ? range : this.radius + 15;

            if (this.type === 'Civilian') {
                let minConstDist = Infinity;
                let checkConst = (item, x, y) => {
                    if (!item.constructed) {
                        let d = Math.hypot(x - this.x, y - this.y);
                        if (d < minConstDist) { minConstDist = d; buildingToBuild = {item, x, y}; }
                    }
                };
                buildings.forEach(b => checkConst(b, b.x, b.y));
                walls.forEach(w => checkConst(w, w.x, w.y));
                drawnRoads.forEach(r => checkConst(r, r.path[0].x, r.path[0].y));
                drawnTrenches.forEach(t => checkConst(t, t.path[0].x, t.path[0].y));


                buildings.forEach(b => {
                    if (b.hp < b.maxHp && b.constructed && Math.hypot(b.x - this.x, b.y - this.y) < range) {
                        b.hp = Math.min(b.maxHp, b.hp + 0.1 * dt);
                    }
                });
                walls.forEach(w => {
                    if (w.hp < w.maxHp && w.constructed && Math.hypot(w.x - this.x, w.y - this.y) < range) {
                        w.hp = Math.min(w.maxHp, w.hp + 0.1 * dt);
                    }
                });
            }

            if (this.type === 'Medic') {
                let healTarget = null;
                let highestPriority = -1;
                
                [player, ...units].forEach(ally => {
                    if (ally === this || ally.hp >= ally.currentMaxHp) return;
                    let score = 0;
                    if (ally.isMeleeClass) score += 50;
                    score += (1 - ally.hp/ally.currentMaxHp) * 100;
                    if (score > highestPriority) {
                        highestPriority = score;
                        healTarget = ally;
                    }
                });

                if (healTarget) {
                    moveDx = healTarget.x - this.x; moveDy = healTarget.y - this.y;
                } else {
                    moveDx = this.targetX - this.x; moveDy = this.targetY - this.y;
                }

                let healingApplied = false;
                [player, ...units].forEach(ally => {
                    if (Math.hypot(ally.x - this.x, ally.y - this.y) < 80 && ally.hp < ally.currentMaxHp) {
                        ally.hp = Math.min(ally.currentMaxHp, ally.hp + 2 * dt);
                        healingApplied = true;
                    }
                });
                if(healingApplied && Math.random() < dt) playSound('heal_aura', 0.2, 1000);

            } else if (buildingToBuild) {
                let dx = buildingToBuild.x - this.x;
                let dy = buildingToBuild.y - this.y;
                if (Math.hypot(dx, dy) > 40) {
                    moveDx = dx; moveDy = dy;
                } else {
                    moveDx = 0; moveDy = 0;
                    buildingToBuild.item.buildProgress += dt;
                    if (buildingToBuild.item.buildProgress >= buildingToBuild.item.buildReq) {
                        buildingToBuild.item.constructed = true;
                    }
                }
            } else if (this.isMeleeClass && closestZ) {
                moveDx = closestZ.x - this.x; moveDy = closestZ.y - this.y;
            } else if (!this.isMeleeClass && closestZ && minDz <= 120 && !inBuildingCurrently) {
                moveDx = this.x - closestZ.x; moveDy = this.y - closestZ.y;
                kiting = true;
            } else {
                moveDx = this.targetX - this.x; moveDy = this.targetY - this.y;
            }

            let distToMove = Math.hypot(moveDx, moveDy);
            let moving = distToMove > 5 || kiting;

            this.activeBuilding = null;
            if (!kiting) {
                for (let b of buildings) {
                    if (b.type === 'Tower' || b.type === 'Bunker' || b.type === 'Sparring') {
                        if (!b.constructed) continue;
                        let cap = b.type === 'Tower' ? (b.upgraded ? 2 : 1) : (b.type === 'Sparring' ? 2 : (b.upgraded ? 3 : 2));
                        let targetNear = Math.hypot(this.targetX - b.x, this.targetY - b.y) < b.radius;
                        let currentlyIn = (!moving && Math.hypot(this.x - b.x, this.y - b.y) < b.radius + 5);
                        
                        if ((targetNear || currentlyIn) && b.occupants < cap) {
                            if (b.type === 'Sparring' && b.expelling > 0) continue;
                            this.activeBuilding = b;
                            this.x = b.x + (b.occupants === 1 ? -6 : (b.occupants === 0 ? 6 : 0));
                            this.y = b.y;
                            b.occupants++;
                            if (b.type === 'Sparring') b.housedUnits.push(this);
                            break;
                        }
                    }
                }
            }

            if (!this.activeBuilding) {
                let nextX = this.x; let nextY = this.y;
    if (moving) {
                    let vx = moveDx / distToMove; let vy = moveDy / distToMove;
                    let speedMulti = isOverTrench(this.x, this.y) ? 0.85 : 1.0;
                    nextX += vx * this.currentSpeed * speedMulti * dt;
                    nextY += vy * this.currentSpeed * speedMulti * dt;
                }

                if (state.gameMode === 'classic' && !this.isMeleeClass && nextY - this.radius < playableHeight / 2) nextY = (playableHeight / 2) + this.radius;
                if (nextY - this.radius < 50) nextY = 50 + this.radius; 
                if (nextY + this.radius > playableHeight) nextY = playableHeight - this.radius;
                if (nextX - this.radius < 0) nextX = this.radius;
                if (nextX + this.radius > canvas.width) nextX = canvas.width - this.radius;

                for (let w of walls) {
                    if (w.isDoor || !w.constructed) continue; 
                    let d = Math.hypot(nextX - w.x, nextY - w.y);
                    let minDist = this.radius + w.radius;
                    if (d < minDist) {
                        let overlap = minDist - d;
                        nextX += ((nextX - w.x) / d) * overlap;
                        nextY += ((nextY - w.y) / d) * overlap;
                    }
                }
                this.x = nextX; this.y = nextY;
            }

            ammoDrops.forEach((drop, i) => {
                if (Math.hypot(drop.x - this.x, drop.y - this.y) < pickupRange && this.type !== 'Tank') {
                    state.ammo += drop.amount; ammoDrops.splice(i, 1);
                    playSound('ammo_pickup', 0.5, 50);
                }
            });
            grenadeDrops.forEach((drop, i) => {
                if (Math.hypot(drop.x - this.x, drop.y - this.y) < pickupRange && this.type !== 'Tank') {
                    player.grenades++; grenadeDrops.splice(i, 1);
                    playSound('grenade_pickup', 0.5, 50);
                }
            });
            coinDrops.forEach((drop, i) => {
                if (Math.hypot(drop.x - this.x, drop.y - this.y) < pickupRange && this.type !== 'Tank') {
                    let amt = Number((drop.value * getCoinMultiplier()).toFixed(2));
                    state.coins = Number((state.coins + amt).toFixed(2));
                    coinDrops.splice(i, 1);
                    playSound('coin_pickup', 0.5, 50);
                    floatingTexts.push(new FloatingText(this.x, this.y - 20, `+$${amt}`, '#f1c40f'));
                }
            });

            if (this.reloadTimer > 0) {
                this.reloadTimer -= dt;
                if (this.reloadTimer <= 0) this.clip = this.maxClip;
            } else if (this.fireTimer > 0) {
                this.fireTimer -= dt;
            } else {
                this.autoFire(wStats);
            }
        }

        autoFire(wStats) {
            if (this.type === 'Medic' || zombies.length === 0) return;
            if (this.clip <= 0) { 
                if (this.reloadTimer <= 0) {
                    if (this.reloadTime > 0) {
                        this.reloadTimer = this.reloadTime; 
                        playSound('reload');
                    } else {
                        this.clip = this.maxClip;
                    }
                }
                return; 
            }

            let range = wStats.type === 'rocket' ? 400 : (wStats.type === 'shuriken' ? 150 : (wStats.type === 'flame' ? 120 : 300));
            if (this.weapon === 'sniper') range = 600;
            
            range *= (1 + 0.10 * upgradesData.unitRange.level);
            if (this.type === 'Spec Ops') range *= 1.25;
            
            let ignoresLOSBuilding = false;
            if (this.activeBuilding) {
                if (this.activeBuilding.type === 'Tower') { range *= (this.activeBuilding.upgraded ? 1.35 : 1.2); ignoresLOSBuilding = true; }
                else if (this.activeBuilding.type === 'Bunker') { range *= 0.85; ignoresLOSBuilding = false; }
            }

            let validTargets = [];
            zombies.forEach(z => {
                if(z.isThrown) return;
                let d = Math.hypot(z.x - this.x, z.y - this.y);
                let meleeRange = this.radius + z.radius + (this.isMeleeClass ? 37.5 : 10);
                
                if (d < meleeRange) {
                    validTargets.push({z: z, d: d, isMelee: true});
                } else if (d < range) {
                    if (ignoresLOSBuilding || wStats.ignoresLOS || checkLOS(this.x, this.y, z.x, z.y)) {
                        validTargets.push({z: z, d: d, isMelee: false});
                    }
                }
            });

            validTargets.sort((a,b) => a.d - b.d);

            if (validTargets.length > 0) {
                let targetInfo = validTargets[0];
                let closest = targetInfo.z;

                if (targetInfo.isMelee) {
                    playSound('sword_swing', 0.5, 50);
                    let finalDmg = this.currentMeleeDmg;
                    let critProb = upgradesData.critChance ? upgradesData.critChance.level * 0.01 : 0;
                    if (Math.random() < critProb) finalDmg *= 10;

                    closest.takeDamage(finalDmg);
                    playSound('zombie_hit', 0.4, 50);
                    floatingTexts.push(new FloatingText(closest.x + (Math.random()*20-10), closest.y - 10, `-${Math.floor(finalDmg)}`, '#e74c3c'));
                    
                    if(closest.hp <= 0) {
                        handleZombieDeath(closest, this);
                        
                        let zIndex = zombies.indexOf(closest);
                        if (zIndex > -1) zombies.splice(zIndex, 1);
                    }
                    
                    this.swipeTimer = 0.2;
                    this.swipeAngle = Math.atan2(closest.y - this.y, closest.x - this.x);

                    if (this.weapon === 'samurai_sword') this.fireTimer = 0.28;
                    else if (this.type === 'Swordsman') this.fireTimer = 0.56;
                    else if (this.type === 'Ninja') this.fireTimer = 0.375;
                    else this.fireTimer = 0.75; 
                    return;
                }

               if (wStats.type === 'melee') return;

                if (wStats.type === 'rocket') {
                    if (player.grenades <= 0) return;
                    player.grenades--;
                    updateUI();
                } else if (!wStats.noAmmo) {
                    if (state.ammo <= 0) return;
                    state.ammo--;
                }

                if(wStats.sfx) playSound(wStats.sfx, 0.4, 50);
                projectiles.push(new Projectile(this.x, this.y, closest.x, closest.y, wStats, this));
                this.clip--; this.fireTimer = this.fireCooldown;
            }
        }

        draw() {
            if(this.activeBuilding) {
                if (this.swipeTimer > 0) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius + 15, this.swipeAngle - Math.PI/3, this.swipeAngle + Math.PI/3);
                    ctx.strokeStyle = '#ecf0f1'; ctx.lineWidth = 3; ctx.stroke();
                }
                return;
            }

            if (this.type === 'Medic') {
                ctx.beginPath(); ctx.arc(this.x, this.y, 80, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(46, 204, 113, 0.15)'; ctx.fill();
                ctx.strokeStyle = 'rgba(46, 204, 113, 0.3)'; ctx.lineWidth = 1; ctx.stroke();
            }

            ctx.beginPath();
            if (this.type === 'Tank') {
                ctx.rect(this.x - 20, this.y - 15, 40, 30); ctx.fillStyle = this.color; ctx.fill();
                ctx.beginPath(); ctx.arc(this.x, this.y, 10, 0, Math.PI*2); ctx.fillStyle = '#2c3e50'; ctx.fill();
            } else {
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.fillStyle = this.color; ctx.fill();
                ctx.lineWidth = 2; ctx.strokeStyle = '#fff'; ctx.stroke();
            }
            
            if (this.type === 'Medic') {
                ctx.fillStyle = '#e74c3c';
                ctx.fillRect(this.x - 2, this.y - 6, 4, 12);
                ctx.fillRect(this.x - 6, this.y - 2, 12, 4);
            }
            
            if (this.swipeTimer > 0) {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius + 15, this.swipeAngle - Math.PI/3, this.swipeAngle + Math.PI/3);
                ctx.strokeStyle = '#ecf0f1'; ctx.lineWidth = 3; ctx.stroke();
            }

            if (this.hp < this.currentMaxHp) {
                ctx.fillStyle = 'red'; ctx.fillRect(this.x - 10, this.y - 18, 20, 3);
                ctx.fillStyle = '#2ed573'; ctx.fillRect(this.x - 10, this.y - 18, 20 * (this.hp / this.currentMaxHp), 3);
            }

            let requiredXp = this.level * 10;
            ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(this.x - 10, this.y - 15, 20, 2);
            ctx.fillStyle = '#3498db'; ctx.fillRect(this.x - 10, this.y - 15, 20 * (this.xp / requiredXp), 2);

            if (this.reloadTimer > 0 && this.type !== 'Medic') {
                ctx.fillStyle = '#555'; ctx.fillRect(this.x - 10, this.y + 15, 20, 3);
                ctx.fillStyle = '#f39c12'; ctx.fillRect(this.x - 10, this.y + 15, 20 * (1 - this.reloadTimer/this.reloadTime), 3);
            }

            ctx.fillStyle = '#f1c40f';
            ctx.font = 'bold 10px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(`Lv.${this.level}`, this.x, this.y - this.radius - 24);
        }
    }

 class Building {
        constructor(x, y, type) {
            this.x = x; this.y = y; this.type = type;
            this.radius = 20;
            this.maxHp = type === 'Bunker' ? 300 : (type === 'Factory' ? 150 : (type === 'Bank' || type === 'Silo' ? 200 : (type === 'Sparring' ? 250 : (type === 'Tower' ? 100 : 50))));
            this.hp = this.maxHp;
            this.occupants = 0;
            this.ammoTimer = 0;
            this.constructed = false;
            this.buildProgress = 0;
            this.buildReq = 20;
            this.upgraded = false;
            this.grenadeTimer = 0;
            this.missileTimer = 0;
            this.discountTimer = 0;
            this.housedUnits = [];
            this.expelling = 0;
            this.trainingTimer = 0;
        }
        draw() {
            if (!this.constructed) {
                ctx.globalAlpha = 0.5;
            }
            let img = getEntityImage(this.type);
            if (img) {
                ctx.drawImage(img, this.x - this.radius, this.y - this.radius, this.radius * 2, this.radius * 2);
            } else {
                if (this.type === 'Tower') {
                    ctx.fillStyle = '#2c3e50'; 
                    ctx.fillRect(this.x - this.radius, this.y - this.radius, this.radius*2, this.radius*2);
                    ctx.fillStyle = this.upgraded ? '#f1c40f' : '#7f8c8d'; 
                    ctx.fillRect(this.x - this.radius + 4, this.y - this.radius + 4, this.radius*2 - 8, this.radius*2 - 8);
                    ctx.fillStyle = '#fff'; ctx.font = '10px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    ctx.fillText("TWR", this.x, this.y - this.radius - 8);
                } else if (this.type === 'Bunker') {
                    ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.fillStyle = this.upgraded ? '#95a5a6' : '#bdc3c7'; ctx.fill(); 
                    ctx.lineWidth = 4; ctx.strokeStyle = this.upgraded ? '#f1c40f' : '#7f8c8d'; ctx.stroke();
                    
                    ctx.beginPath(); ctx.arc(this.x, this.y, this.radius - 6, 0, Math.PI * 2);
                    ctx.fillStyle = '#34495e'; ctx.fill(); 
                    
                    ctx.fillStyle = '#fff'; ctx.font = '10px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    ctx.fillText("BNK", this.x, this.y - this.radius - 8);
                } else if (this.type === 'Clinic') {
                    ctx.fillStyle = this.upgraded ? '#ecf0f1' : '#34495e';
                    ctx.fillRect(this.x - this.radius, this.y - this.radius, this.radius*2, this.radius*2);
                    ctx.fillStyle = this.upgraded ? '#e74c3c' : '#fff'; 
                    ctx.font = '10px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    ctx.fillText(this.upgraded ? "HOSP" : "CLN", this.x, this.y - this.radius - 8);
                    
                    ctx.strokeStyle = 'rgba(46, 204, 113, 0.3)';
                    ctx.beginPath(); ctx.arc(this.x, this.y, this.upgraded ? 130 : 100, 0, Math.PI*2); ctx.stroke();
                } else if (this.type === 'Factory') {
                    ctx.fillStyle = this.upgraded ? '#e67e22' : '#7f8c8d'; 
                    ctx.fillRect(this.x - this.radius, this.y - this.radius, this.radius*2, this.radius*2);
                    ctx.fillStyle = '#2c3e50'; 
                    ctx.fillRect(this.x + 5, this.y - this.radius - 10, 10, 20); 
                    ctx.fillStyle = '#e74c3c'; 
                    ctx.beginPath(); ctx.arc(this.x + 10, this.y - this.radius - 15, 3 + Math.random()*2, 0, Math.PI*2); ctx.fill(); 
                    ctx.fillStyle = '#fff'; ctx.font = '10px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    ctx.fillText("FAC", this.x, this.y + 5);
                } else if (this.type === 'Silo') {
                    ctx.fillStyle = this.upgraded ? '#c0392b' : '#555';
                    ctx.fillRect(this.x - this.radius, this.y - this.radius, this.radius*2, this.radius*2);
                    ctx.fillStyle = '#e74c3c';
                    ctx.beginPath(); ctx.arc(this.x, this.y, 8, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = '#fff'; ctx.font = '10px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    ctx.fillText("SILO", this.x, this.y - this.radius - 8);
 } else if (this.type === 'Bank') {
                    ctx.fillStyle = '#f1c40f';
                    ctx.fillRect(this.x - this.radius, this.y - this.radius, this.radius*2, this.radius*2);
                    if (this.upgraded) {
                        ctx.strokeStyle = '#2ecc71'; ctx.lineWidth = 3;
                        ctx.strokeRect(this.x - this.radius, this.y - this.radius, this.radius*2, this.radius*2);
                    }
                    ctx.fillStyle = '#000'; ctx.font = '10px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    ctx.fillText("BANK", this.x, this.y);
                } else if (this.type === 'Sparring') {
                    ctx.fillStyle = this.upgraded ? '#8e44ad' : '#9b59b6';
                    ctx.fillRect(this.x - this.radius, this.y - this.radius, this.radius*2, this.radius*2);
                    ctx.fillStyle = '#2c3e50';
                    ctx.fillRect(this.x - this.radius + 2, this.y - this.radius + 2, this.radius*2 - 4, this.radius*2 - 4);
                    ctx.fillStyle = '#fff'; ctx.font = '10px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    ctx.fillText("SPAR", this.x, this.y - this.radius - 8);
                    
                    if (this.occupants === 2) {
                        ctx.fillStyle = '#555'; ctx.fillRect(this.x - 10, this.y + 5, 20, 3);
                        ctx.fillStyle = '#3498db'; ctx.fillRect(this.x - 10, this.y + 5, 20 * ((this.trainingTimer||0)/30), 3);
                    }
                }
            }

            if (this.type === 'Tower') {
                let cap = this.upgraded ? 2 : 1;
                for (let i = 0; i < cap; i++) {
                    ctx.fillStyle = this.occupants > i ? '#2ecc71' : '#e74c3c';
                    ctx.beginPath(); ctx.arc(this.x + this.radius - 5 - (i * 10), this.y - this.radius + 5, 4, 0, Math.PI*2); ctx.fill();
                    ctx.lineWidth = 1; ctx.strokeStyle = '#000'; ctx.stroke();
                }
            } else if (this.type === 'Bunker') {
                let cap = this.upgraded ? 3 : 2;
                for (let i = 0; i < cap; i++) {
                    ctx.fillStyle = this.occupants > i ? '#2ecc71' : '#e74c3c';
                    ctx.beginPath(); ctx.arc(this.x - 10 + (i * 10), this.y + this.radius - 7, 4, 0, Math.PI*2); ctx.fill();
                    ctx.lineWidth = 1; ctx.strokeStyle = '#000'; ctx.stroke();
                }
            } else if (this.type === 'Sparring') {
                for (let i = 0; i < 2; i++) {
                    ctx.fillStyle = this.occupants > i ? '#2ecc71' : '#e74c3c';
                    ctx.beginPath(); ctx.arc(this.x - 5 + (i * 10), this.y + this.radius - 7, 4, 0, Math.PI*2); ctx.fill();
                    ctx.lineWidth = 1; ctx.strokeStyle = '#000'; ctx.stroke();
                }
            }

            ctx.globalAlpha = 1.0;

            if (!this.constructed) {
                ctx.fillStyle = 'red'; ctx.fillRect(this.x - 15, this.y + this.radius + 4, 30, 4);
                ctx.fillStyle = '#2ed573'; ctx.fillRect(this.x - 15, this.y + this.radius + 4, 30 * (this.buildProgress / this.buildReq), 4);
            } else if (this.hp < this.maxHp) {
                ctx.fillStyle = 'red'; ctx.fillRect(this.x - 15, this.y + this.radius + 4, 30, 4);
                ctx.fillStyle = '#2ed573'; ctx.fillRect(this.x - 15, this.y + this.radius + 4, 30 * (this.hp / this.maxHp), 4);
            }
        }
        update(dt) {
            if (!this.constructed) return;
            if (this.type === 'Clinic') {
                let healingApplied = false;
                let healRate = this.upgraded ? 6.5 : 5;
                let healRadius = this.upgraded ? 130 : 100;
                if (Math.hypot(player.x - this.x, player.y - this.y) < healRadius && player.hp < player.currentMaxHp) {
                    player.hp = Math.min(player.currentMaxHp, player.hp + healRate * dt);
                    healingApplied = true;
                }
                units.forEach(u => {
                    if (Math.hypot(u.x - this.x, u.y - this.y) < healRadius && u.hp < u.currentMaxHp) {
                        u.hp = Math.min(u.currentMaxHp, u.hp + healRate * dt);
                        healingApplied = true;
                    }
                });
                if(healingApplied && Math.random() < dt) playSound('heal_aura', 0.2, 1000);
            } else if (this.type === 'Factory') {
                let rate = 1.0 * (1 + 0.2 * upgradesData.ammoProd.level);
                this.ammoTimer += dt;
                if (this.ammoTimer >= 1.0 / rate) {
                    state.ammo += this.upgraded ? 3 : 1;
                    this.ammoTimer -= (1.0 / rate);
                }
                if (this.upgraded) {
                    this.grenadeTimer += dt;
                    if (this.grenadeTimer >= 30) {
                        player.grenades++;
                        this.grenadeTimer -= 30;
                    }
                }
           } else if (this.type === 'Silo') {
                this.missileTimer += dt;
                let interval = this.upgraded ? 30 : 45;
                if (this.missileTimer >= interval) {
                    if (player.grenades > 0) {
                        player.grenades--;
                        updateUI();
                        this.missileTimer = 0;
                        let targetX = Math.random() * canvas.width;
                        let targetY = state.gameMode === 'circle' ? Math.random() * canvas.height : Math.random() * (playableHeight / 2);
                        if (zombies.length > 0) {
                            let z = zombies[Math.floor(Math.random() * zombies.length)];
                            targetX = z.x; targetY = z.y;
                        }
                        let mStats = { 
                            type: 'rocket', 
                            dmg: this.upgraded ? 600 : 300, 
                            id: 'silo_missile',
                            aoe: this.upgraded ? 480 : 240
                        };
                        projectiles.push(new Projectile(this.x, this.y, targetX, targetY, mStats, null));
   } else {
                        // Hold timer at max until a grenade is available
                        this.missileTimer = interval;
                    }
                }
            } else if (this.type === 'Sparring') {
                if (this.expelling > 0) this.expelling -= dt;
                if (this.occupants === 2) {
                    this.trainingTimer += dt;
                    if (this.trainingTimer >= 30) {
                        this.trainingTimer -= 30;
                        let multi = this.upgraded ? 2 : 1;
                        this.housedUnits.forEach(u => {
                            let isMelee = u.isMeleeClass;
                            let dmgBoost = isMelee ? 0.01 : 0.005;
                            u.bonusMelee += dmgBoost * multi;
                            u.bonusAtkSpeed *= (1 - (dmgBoost * multi)); 
                            
                            if (this.upgraded) {
                                u.bonusMoveSpeed += 0.005;
                                u.bonusMaxHp += 0.005;
                                u.hp += u.currentMaxHp * 0.005;
                            }
                        });
                        floatingTexts.push(new FloatingText(this.x, this.y - 20, "TRAINED!", '#3498db'));
                    }
                } else {
                    this.trainingTimer = 0;
                }
            }
        }
    }
    

     class Player {
        constructor() {
            this.x = canvas.width / 2; this.y = playableHeight * 0.75;
            this.targetX = this.x; this.targetY = this.y;
            this.baseMaxHp = 50; this.baseSpeedConfig = 102; 
            this.baseMelee = 5;
            
            this.level = 1;
            this.xp = 0;

            this.perks = {
                reloadSpeedMulti: 1.0, damageMulti: 1.0, moveSpeedMulti: 1.0, maxHpMulti: 1.0,
                regenRate: 0, fireRateMulti: 1.0, clipMulti: 1.0, rangeMulti: 1.0,
                upgradeCostMulti: 1.0, buildingCostMulti: 1.0, unitCostMulti: 1.0,
                coinSpawnMulti: 1.0, grenadeSpawnMulti: 1.0, ammoSpawnMulti: 1.0,
                meleeKnockbackChance: 0, ricochetChance: 0, critChance: 0, pierceChance: 0
            };

            this.hp = this.currentMaxHp;
            this.radius = 15; this.color = '#f5cba7'; 
            
            this.weapon = 'pistol'; this.clip = this.maxClip;
            this.fireTimer = 0; this.reloadTimer = 0; this.activeBuilding = null; 
            this.grenades = 0;
            this.swipeTimer = 0;
            this.swipeAngle = 0;
            this.regenTimer = 0;
            this.angle = 0;
        }

        gainXp() {
            this.xp++;
            let requiredXp = this.level * 10;
            if (this.xp >= requiredXp) {
                this.xp -= requiredXp;
                this.level++;
                floatingTexts.push(new FloatingText(this.x, this.y - 35, `LEVEL UP!`, '#3498db'));
                playSound('buy_upgrade', 0.5, 50);
                this.hp = this.currentMaxHp; 
                showPerkScreen();
            }
        }

        get currentMaxHp() { return this.baseMaxHp * (1 + 0.10 * upgradesData.unitHealth.level) * (1 + (this.level - 1) * 0.01) * this.perks.maxHpMulti; }
        get currentSpeed() { return this.baseSpeedConfig * (1 + 0.10 * upgradesData.unitSpeed.level) * (1 + (this.level - 1) * 0.01) * this.perks.moveSpeedMulti; }
        get currentMeleeDmg() { return this.baseMelee * (1 + 0.10 * upgradesData.unitDamage.level) * (1 + (this.level - 1) * 0.01) * this.perks.damageMulti; }
        get fireCooldown() { return WEAPONS[this.weapon].cd * Math.pow(0.90, upgradesData.fireRate.level) * Math.pow(0.99, this.level - 1) * this.perks.fireRateMulti; }
        get reloadTime() { return WEAPONS[this.weapon].reload * Math.pow(0.90, upgradesData.reloadTime.level) * Math.pow(0.99, this.level - 1) * this.perks.reloadSpeedMulti; }
        get isMeleeClass() { return this.weapon === 'sword' || this.weapon === 'samurai_sword'; } 
        
        get maxClip() { 
            let base = WEAPONS[this.weapon].clip;
            let upgradeMulti = 1 + (0.10 * (upgradesData.clipSize ? upgradesData.clipSize.level : 0));
            return WEAPONS[this.weapon].noAmmo ? base : Math.ceil(base * this.perks.clipMulti * upgradeMulti); 
        }

        update(dt) {
            if(this.swipeTimer > 0) this.swipeTimer -= dt;

            let totalRegen = (upgradesData.regen.level * 0.001) + this.perks.regenRate;
            if (totalRegen > 0 && this.hp < this.currentMaxHp) {
                this.hp = Math.min(this.currentMaxHp, this.hp + (this.currentMaxHp * totalRegen * dt));
            }

            if (this.isMeleeClass) {
                this.regenTimer += dt;
                if (this.regenTimer >= 5.0) {
                    this.hp = Math.min(this.currentMaxHp, this.hp + 1);
                    this.regenTimer = 0;
                }
            }

            let moveDx = this.targetX - this.x; let moveDy = this.targetY - this.y;
            let distToMove = Math.hypot(moveDx, moveDy);
            let moving = distToMove > 5;
            if (moving) this.angle = Math.atan2(moveDy, moveDx);

            this.activeBuilding = null;
            for (let b of buildings) {
                if (b.type === 'Tower' || b.type === 'Bunker') {
                    if (!b.constructed) continue;
                    let cap = b.type === 'Tower' ? (b.upgraded ? 2 : 1) : (b.upgraded ? 3 : 2);
                    let targetNear = Math.hypot(this.targetX - b.x, this.targetY - b.y) < b.radius;
                    let physicallyNear = Math.hypot(this.x - b.x, this.y - b.y) < b.radius + 5;
                    
                    if (targetNear && physicallyNear && b.occupants < cap) {
                        this.activeBuilding = b;
                        this.x = b.x + (b.occupants === 1 ? -6 : (b.occupants === 0 ? 6 : 0));
                        this.y = b.y;
                        b.occupants++;
                        break;
                    }
                }
            }

            if(!this.activeBuilding) {
                let nextX = this.x; let nextY = this.y;

                   if (moving) {
                    let speedMulti = isOverTrench(this.x, this.y) ? 0.85 : 1.0;
                    nextX += (moveDx / distToMove) * this.currentSpeed * speedMulti * dt;
                    nextY += (moveDy / distToMove) * this.currentSpeed * speedMulti * dt;
                }

                if (state.gameMode === 'classic' && !this.isMeleeClass && nextY - this.radius < playableHeight / 2) nextY = (playableHeight / 2) + this.radius;

                if (nextY - this.radius < 0) nextY = this.radius; 
                if (nextY + this.radius > playableHeight) nextY = playableHeight - this.radius;
                if (nextX - this.radius < 0) nextX = this.radius;
                if (nextX + this.radius > canvas.width) nextX = canvas.width - this.radius;
                
                        for (let w of walls) {
                    if (w.isDoor || !w.constructed) continue; 
                    let d = Math.hypot(nextX - w.x, nextY - w.y);
                    let minDist = this.radius + w.radius;
                    if (d < minDist) {
                        let overlap = minDist - d;
                        nextX += ((nextX - w.x) / d) * overlap;
                        nextY += ((nextY - w.y) / d) * overlap;
                    }
                }
                this.x = nextX; this.y = nextY;
            }

 ammoDrops.forEach((drop, i) => {
                if (Math.hypot(drop.x - this.x, drop.y - this.y) < this.radius + 15) {
                    state.ammo += drop.amount; ammoDrops.splice(i, 1);
                    playSound('ammo_pickup', 0.5, 50);
                }
            });
            grenadeDrops.forEach((drop, i) => {
                if (Math.hypot(drop.x - this.x, drop.y - this.y) < this.radius + 15) {
                    this.grenades++; grenadeDrops.splice(i, 1);
                    playSound('grenade_pickup', 0.5, 50);
                }
            });
            coinDrops.forEach((drop, i) => {
                if (Math.hypot(drop.x - this.x, drop.y - this.y) < this.radius + 15) {
                    let amt = Number((drop.value * getCoinMultiplier()).toFixed(2));
                    state.coins = Number((state.coins + amt).toFixed(2));
                    coinDrops.splice(i, 1);
                    playSound('coin_pickup', 0.5, 50);
                    floatingTexts.push(new FloatingText(this.x, this.y - 20, `+$${amt}`, '#f1c40f'));
                }
            });

            let wStats = WEAPONS[this.weapon];
            if (this.reloadTimer > 0) {
                this.reloadTimer -= dt;
                if (this.reloadTimer <= 0) this.clip = this.maxClip;
            } else if (this.fireTimer > 0) {
                this.fireTimer -= dt;
            } else {
                this.autoFire(wStats);
            }
        }

        autoFire(wStats) {
            if (zombies.length === 0) return;
            
            let requiresGrenade = wStats.type === 'rocket';
            let hasAmmo = requiresGrenade ? player.grenades > 0 : (state.ammo > 0 || wStats.noAmmo);
            
            if (this.clip <= 0 || !hasAmmo) {
                if (this.clip <= 0 && hasAmmo && this.reloadTimer <= 0) {
                    if (this.reloadTime > 0) {
                        this.reloadTimer = this.reloadTime; 
                        playSound('reload');
                    } else {
                        this.clip = this.maxClip;
                    }
                }
                return;
            }

            let range = wStats.type === 'rocket' ? 400 : (wStats.type === 'flame' ? 120 : 350); 
            if (this.weapon === 'sniper') range = 700;
            
            range *= (1 + 0.10 * upgradesData.unitRange.level) * this.perks.rangeMulti;

            let ignoresLOSBuilding = false;
            if (this.activeBuilding) {
                if (this.activeBuilding.type === 'Tower') { range *= (this.activeBuilding.upgraded ? 1.35 : 1.2); ignoresLOSBuilding = true; }
                else if (this.activeBuilding.type === 'Bunker') { range *= 0.85; ignoresLOSBuilding = false; }
            }

            let validTargets = [];
            zombies.forEach(z => {
                if(z.isThrown) return;
                let d = Math.hypot(z.x - this.x, z.y - this.y);
                let meleeRange = this.radius + z.radius + (this.isMeleeClass ? 30 : 10);
                
                if (d < meleeRange) {
                    validTargets.push({z: z, d: d, isMelee: true});
                } else if (d < range) {
                    if (ignoresLOSBuilding || wStats.ignoresLOS || checkLOS(this.x, this.y, z.x, z.y)) {
                        validTargets.push({z: z, d: d, isMelee: false});
                    }
                }
            });

            validTargets.sort((a,b) => a.d - b.d);

            if (validTargets.length > 0) {
                let targetInfo = validTargets[0];
                let closest = targetInfo.z;

                if (targetInfo.isMelee) {
                    playSound('sword_swing', 0.5, 50);
                    
                    let finalDmg = this.currentMeleeDmg;
                    let critProb = this.perks.critChance + (upgradesData.critChance ? upgradesData.critChance.level * 0.01 : 0);
                    if (Math.random() < critProb) finalDmg *= 10;
                    
                    closest.takeDamage(finalDmg);
                    playSound('zombie_hit', 0.4, 50);
                    floatingTexts.push(new FloatingText(closest.x + (Math.random()*20-10), closest.y - 10, `-${Math.floor(finalDmg)}`, '#e74c3c'));
                    
                    if (Math.random() < this.perks.meleeKnockbackChance) {
                        closest.x += Math.cos(this.swipeAngle) * 30;
                        closest.y += Math.sin(this.swipeAngle) * 30;
                    }

                    if(closest.hp <= 0) {
                        handleZombieDeath(closest, this);
                        
                        let zIndex = zombies.indexOf(closest);
                        if (zIndex > -1) zombies.splice(zIndex, 1);
                    }
                    
                    this.swipeTimer = 0.2;
                    this.swipeAngle = Math.atan2(closest.y - this.y, closest.x - this.x);

                     this.fireTimer = 1.0; 
                    return;
                }

                if (wStats.type === 'rocket') {
                    player.grenades--;
                    updateUI();
                } else if (!wStats.noAmmo) {
                    state.ammo--;
                }
                
                if(wStats.sfx) playSound(wStats.sfx, 0.4, 50);
                projectiles.push(new Projectile(this.x, this.y, closest.x, closest.y, wStats, this));
                this.clip--; this.fireTimer = this.fireCooldown;
            }
        }

        draw() {
            if(this.activeBuilding) {
                if (this.swipeTimer > 0) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius + 15, this.swipeAngle - Math.PI/3, this.swipeAngle + Math.PI/3);
                    ctx.strokeStyle = '#ecf0f1'; ctx.lineWidth = 3; ctx.stroke();
                }
                return;
            }

            ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = this.color; ctx.fill();
            ctx.lineWidth = 2; ctx.strokeStyle = '#2c3e50'; ctx.stroke();

            if (this.swipeTimer > 0) {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius + 15, this.swipeAngle - Math.PI/3, this.swipeAngle + Math.PI/3);
                ctx.strokeStyle = '#ecf0f1'; ctx.lineWidth = 3; ctx.stroke();
            }

            ctx.fillStyle = 'red'; ctx.fillRect(this.x - 15, this.y - 25, 30, 4);
            ctx.fillStyle = '#2ed573'; ctx.fillRect(this.x - 15, this.y - 25, 30 * (this.hp / this.currentMaxHp), 4);

            let requiredXp = this.level * 10;
            ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(this.x - 15, this.y - 21, 30, 3);
            ctx.fillStyle = '#3498db'; ctx.fillRect(this.x - 15, this.y - 21, 30 * (this.xp / requiredXp), 3);

            if (this.reloadTimer > 0) {
                ctx.fillStyle = 'white'; ctx.font = '10px sans-serif'; ctx.textAlign = 'left'; ctx.fillText("Reloading", this.x - 20, this.y + 30);
                ctx.fillStyle = '#555'; ctx.fillRect(this.x - 15, this.y + 35, 30, 4);
                ctx.fillStyle = '#f39c12'; ctx.fillRect(this.x - 15, this.y + 35, 30 * (1 - this.reloadTimer/this.reloadTime), 4);
            }

            ctx.fillStyle = '#f1c40f';
            ctx.font = 'bold 10px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(`Lv.${this.level}`, this.x, this.y - this.radius - 32);
        }
    }

class Zombie {

                this.baseCoinReward = 2;

                this.baseCoinReward = 15;
            } else if (this.type === 'boss_tiger') {
                baseHp = 5 * hpMulti * 100;
                baseSpeed = 49.5 * 2;
                this.radius = 20;
                this.baseCoinReward = 100;
                this.attackCooldownMax = 1.0 / 3;
            } else if (this.type === 'boss_ogre') {

            } else if (this.type === 'boss_dragon') {

                baseSpeed = 20;
                this.radius = 50;
                this.baseCoinReward = 400;
            } else if (this.type === 'boss_hydra') {

                baseSpeed = 6.6 * 0.75;
                this.radius = 60;
                this.baseCoinReward = 800;
            } else if (this.type === 'boss_jesus') {
                baseHp = 10000 * hpMulti;
                baseSpeed = 10;
                this.radius = 30;
                this.baseCoinReward = 2000;
                this.spawnTimer = 10.0;
                this.missileTimer = 3.0;
            } else {
                baseHp = 20 * hpMulti; this.radius = 12 + ((baseHp / 200) * 8); 
            }
            
            if (!this.type.startsWith('boss_') && this.type !== 'jouster') {
                baseHp *= 1.20;
                baseHp *= 0.90; 
                baseHp *= (1 + (wave * 0.01));
            }

            this.maxHp = Math.floor(baseHp) + (this.type === 'normal' ? 5 : 0); 
            this.hp = this.maxHp;
            this.hpScale = this.maxHp / 20; 
            
            if (!this.type.startsWith('boss_') && this.type !== 'jouster') {
                baseSpeed *= 1.27; 
                baseSpeed *= 1.20;
            }

            let speedBoost = Math.random() > 0.7 ? (Math.random() * 0.3 + 0.1) : 0; 
            this.speed = baseSpeed * (1 + speedBoost) * 1.045;

            let baseDmg = (this.type === 'brute' || this.type === 'vulture' ? 25 : 5) + Math.floor(Math.max(0, this.hp - 20) / 10);
            if (this.type === 'boss_tiger') baseDmg = 25;
            if (this.type === 'boss_ogre') baseDmg = 125;
            if (this.type === 'boss_dragon') baseDmg = 250;
            if (this.type === 'boss_hydra') baseDmg = 1250;
            if (this.type === 'boss_jesus') baseDmg = 500;
            
            this.damage = (baseDmg * 1.15) * 2;
            
            this.lurchOffset = Math.random() * Math.PI * 2; 
            this.attackCooldown = 0; 
            this.angle = 0;

            this.isThrown = false;
            this.throwCooldown = 5.0;

            if(Math.random() < 0.2) {
                if(this.type === 'normal') playSound('zombie_groan', 0.2, 500);
                if(this.type === 'dog' || this.type === 'boss_tiger') playSound('dog_growl', 0.2, 500);
                if(this.type === 'crow' || this.type === 'vulture' || this.type === 'boss_dragon') playSound('crow_caw', 0.2, 500);
                if(this.type === 'brute' || this.type === 'boss_ogre' || this.type === 'boss_hydra') playSound('brute_roar', 0.4, 1000);
            }
        }

                     get coinReward() { return Number((this.baseCoinReward * this.hpScale * getCoinMultiplier() * (this.armored ? 2 : 1) * 0.504).toFixed(2)); }


        takeDamage(amt) {
            if (this.armored) amt *= 0.4;
            if (this.type === 'jouster') {
                if (this.horseHp > 0 && this.riderHp > 0) {
                    if (Math.random() < 0.5) {
                        this.horseHp -= amt;
                        if (this.horseHp <= 0) {
                            this.riderHp -= 10;
                            this.armored = true;
                            this.speed = 15 * 1.27 * 1.20; 
                            this.radius = 12;
                        }
                    } else {
                        this.riderHp -= amt;
                        if (this.riderHp <= 0) this.armored = false;
                    }
                    this.hp = Math.max(0, this.horseHp) + Math.max(0, this.riderHp);
                } else if (this.horseHp > 0) {
                    this.horseHp -= amt;
                    this.hp = this.horseHp;
                } else if (this.riderHp > 0) {
                    this.riderHp -= amt;
                    this.hp = this.riderHp;
                }
            } else {
                this.hp -= amt;
            }
        }

        update(dt) {
            if (this.isThrown) {
                this.throwProgress += dt * this.throwSpeed;
                
   if (!this.hasDealtThrowDamage) {
                    let hitWall = null;
                    for (let w of walls) {
                        if (w.upgraded && Math.hypot(this.x - w.x, this.y - w.y) < this.radius + w.radius) {
                            hitWall = w; break;
                        }
                    }
                    if (hitWall) {
                        this.isThrown = false;
                        this.x -= Math.cos(this.angle) * 30;
                        this.y -= Math.sin(this.angle) * 30;
                        return;
                    }

                    let hitTarget = null;
                    if (Math.hypot(this.x - player.x, this.y - player.y) < this.radius + player.radius && !isOverTrench(player.x, player.y)) {
                        hitTarget = player;
                    } else {
                        for (let u of units) {
                            if (Math.hypot(this.x - u.x, this.y - u.y) < this.radius + u.radius && !isOverTrench(u.x, u.y)) {
                                hitTarget = u; break;
                            }
                        }
                    }
                    
                    if (hitTarget) {
                        hitTarget.hp -= 10;
                        this.hasDealtThrowDamage = true;
                        floatingTexts.push(new FloatingText(hitTarget.x, hitTarget.y - 10, "-10", '#e74c3c'));
                        playSound('zombie_hit', 0.4, 50);
                        
                        let angle = Math.atan2(hitTarget.y - this.y, hitTarget.x - this.x);
                        hitTarget.x += Math.cos(angle) * 20;
                        hitTarget.y += Math.sin(angle) * 20;
                        
                        this.isThrown = false;
                        this.x -= Math.cos(angle) * 30;
                        this.y -= Math.sin(angle) * 30;
                        return;
                    }
                }

                if (this.throwProgress >= 1) {
                    this.isThrown = false;
                    this.x = this.throwTargetX;
                    this.y = this.throwTargetY;
                } else {
                    this.x = this.startX + (this.throwTargetX - this.startX) * this.throwProgress;
                    let baseY = this.startY + (this.throwTargetY - this.startY) * this.throwProgress;
                    let arc = Math.sin(this.throwProgress * Math.PI) * 100;
                    this.y = baseY - arc;
                }
                return; 
            }

            if (this.type === 'swerve' && this.dodgeCooldown <= 0) {
                for (let p of projectiles) {
                    if (!p.isEnemy && p.stats.type !== 'flame' && p.stats.type !== 'rocket') {
                        let dx = p.x - this.x;
                        let dy = p.y - this.y;
                        let dist = Math.hypot(dx, dy);
                        if (dist < 100) {
                            let dot = (dx * p.vx + dy * p.vy);
                            if (dot < 0) {
                                let dodgeDir = Math.random() < 0.5 ? 1 : -1;
                                let pSpeed = Math.hypot(p.vx, p.vy);
                                if (pSpeed > 0) {
                                    let perpX = -p.vy / pSpeed * dodgeDir;
                                    let perpY = p.vx / pSpeed * dodgeDir;
                                    this.x += perpX * 40;
                                    this.y += perpY * 40;
                                    this.dodgeCooldown = 5.0;
                                    break;
                                }
                            }
                        }
                    }
                }
            }
            if (this.dodgeCooldown > 0) this.dodgeCooldown -= dt;

                    if (friend) {

    let target = player;
            let minDistToHuman = Math.hypot(player.x - this.x, player.y - this.y);
            
            if (state.gameMode === 'circle') {

            units.forEach(u => {

            buildings.forEach(b => {

                    }
                }
            });

            let dx = target.x - this.x; let dy = target.y - this.y;
            let distToTarget = Math.hypot(dx, dy);
            
            let vx = 0, vy = 1;

            if (this.type === 'boss_dragon') {

                    projectiles.push(new Projectile(this.x, this.y, player.x + 50, player.y, mStats, this));
                    projectiles.push(new Projectile(this.x, this.y, player.x - 50, player.y, mStats, this));
                }
            }

           let lurch = Math.abs(Math.sin((state.time * 3.33) + this.lurchOffset));
            let isTrench = isOverTrench(this.x, this.y);

            let nextX = this.x + vx * frameSpeed; let nextY = this.y + vy * frameSpeed;
            
            let hitWall = false;

            let lanceRange = (this.type === 'jouster' && this.riderHp > 0) ? 40 : 0;

            if (!canFly) {
     for (let b of buildings) {

              if (distToTarget < this.radius + (target.radius||20) + lanceRange) {

                    if (target.activeBuilding) {

                    } else {

                        if (target.isMeleeClass) dmg /= 4;

                    }
                    this.attackCooldown = this.attackCooldownMax; 
                }
            }

            for (let u of units) {

                            if (u.isMeleeClass) dmg /= 4;
                            u.hp -= dmg;

        }

        draw() {

                }
                if (this.riderHp > 0) {
                    ctx.beginPath(); ctx.arc(0, 0, this.radius*0.8, 0, Math.PI*2);
                    ctx.fillStyle = '#27ae60'; ctx.fill();
                    if(this.armored) { ctx.lineWidth=2; ctx.strokeStyle='#bdc3c7'; ctx.stroke(); }
                    ctx.fillStyle = '#7f8c8d';
                    ctx.fillRect(0, -2, 40, 4);
                }
            } else {
                ctx.beginPath(); ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.lineWidth = this.armored ? 4 : 2; 
                ctx.strokeStyle = this.armored ? '#bdc3c7' : '#000'; 
                ctx.stroke();
                
                if (this.type === 'brute' || this.type === 'boss_ogre' || this.type === 'boss_hydra') {
                    ctx.fillRect(-this.radius*0.8, -this.radius*1.2, this.radius*1.6, this.radius*2.4);
                    ctx.strokeRect(-this.radius*0.8, -this.radius*1.2, this.radius*1.6, this.radius*2.4);
                }
            }

            ctx.rotate(-this.angle);
            ctx.translate(-this.x, -this.y);
            
            if (this.isThrown) {
                ctx.beginPath();
                ctx.ellipse(this.x, this.y + 40, this.radius, this.radius/2, 0, 0, Math.PI*2);
                ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.fill();
            }

            if (this.hp < this.maxHp) {
                let hpRatio = Math.max(0, this.hp / this.maxHp);
                ctx.fillStyle = 'red'; ctx.fillRect(this.x - 10, this.y - this.radius - 8, 20, 3);
                ctx.fillStyle = '#2ed573'; ctx.fillRect(this.x - 10, this.y - this.radius - 8, 20 * hpRatio, 3);
            }
        }
    }

         if ((state.mode === 'wooden_wall' || state.mode === 'metal_wall' || state.mode === 'road' || state.mode === 'trench') && state.isDrawing) {
                let lastPoint = state.currentPath[state.currentPath.length - 1];
                let dist = Math.hypot(pos.x - lastPoint.x, pos.y - lastPoint.y);
                const SEG_LEN = 26; 
                
                if (dist >= SEG_LEN) {
                    let steps = Math.floor(dist / SEG_LEN);

                    for (let i = 1; i <= steps; i++) {

                            let nx = lastPoint.x + (pos.x - lastPoint.x) * (i / steps);
                            let ny = lastPoint.y + (pos.y - lastPoint.y) * (i / steps);
                            let newPos = { x: nx, y: ny };
                            state.currentPath.push(newPos);

            let costPerSeg = Math.floor(18 * player.perks.buildingCostMulti * getDiscountMultiplier());
            state.coins = Number((state.coins + costPerSeg).toFixed(2));
            updateUI();
        }
        state.currentPath = []; exitModes();
    }

    function drawPath(path, color, width, dash = []) {
        if(path.length < 2) return;
        ctx.beginPath(); ctx.moveTo(path[0].x, path[0].y);
        for(let i=1; i<path.length; i++) ctx.lineTo(path[i].x, path[i].y);
        ctx.strokeStyle = color; ctx.lineWidth = width;
        ctx.lineJoin = 'round'; ctx.lineCap = 'round';
        ctx.setLineDash(dash); ctx.stroke(); ctx.setLineDash([]);
    }
