        document.getElementById('grenadeCount').innerText = player.grenades;
        document.getElementById('waveCount').innerText = state.wave;
        document.getElementById('playerHp').innerText = Math.max(0, Math.floor(player.hp));
        document.getElementById('campHp').innerText = Math.max(0, state.campHp);

        // Dynamically update purchase cost displays if discounts are applied
        let acd = document.getElementById('ammoCostDisplay');
        if (acd) acd.innerText = `🪙${Math.floor(15 * getDiscountMultiplier())}`;
        
        let gcd = document.getElementById('grenadeCostDisplay');
        if (gcd) gcd.innerText = `🪙${Math.floor(50 * getDiscountMultiplier())}`;

        const nwb = document.getElementById('nextWaveBtn');
        if (nwb) {
            if (!state.waveActive && state.wave > 0 && state.waveDelay > 0) {
                nwb.style.display = 'block';
                let waveBonus = 1 + (upgradesData.waveEarnings ? upgradesData.waveEarnings.level * 0.20 : 0);
                document.getElementById('rushBonus').innerText = Number((state.waveDelay * getCoinMultiplier() * waveBonus).toFixed(2));
            } else {
                nwb.style.display = 'none';
            }
        }
    }

    function forceNextWave() {
        if (!state.waveActive && state.waveDelay > 0) {
            let waveBonus = 1 + (upgradesData.waveEarnings ? upgradesData.waveEarnings.level * 0.20 : 0);
            let bonus = Number((state.waveDelay * getCoinMultiplier() * waveBonus).toFixed(2));
            state.coins = Number((state.coins + bonus).toFixed(2));
            state.lastWaveIncome = Number(((state.lastWaveIncome || 0) + bonus).toFixed(2));
            playSound('coin_pickup');
            state.waveDelay = 0; 
            updateUI();
        }
    }

function startNextWave() {
        state.wave++;
        playSound('wave_start');
        state.zombiesToSpawn = [];
        state.waveTextTimer = 3.0; 
        
        let waveMulti = 1 + (state.wave * 0.05);
        if (state.wave >= 10) {
            waveMulti += (state.wave * 0.10); 
        }

        if (state.wave % 10 === 0 && state.wave > 0) {
            if (state.wave === 10) state.zombiesToSpawn.push('boss_tiger');
            else if (state.wave === 20) state.zombiesToSpawn.push('boss_ogre');
            else if (state.wave === 30) state.zombiesToSpawn.push('boss_dragon');
            else if (state.wave === 40) state.zombiesToSpawn.push('boss_hydra');
            else if (state.wave >= 50) state.zombiesToSpawn.push('boss_jesus');
        }

        if (state.wave === 1) {
            state.zombiesToSpawn.push('normal');
        } else if (state.wave === 2) {
            state.zombiesToSpawn.push('normal', 'normal', 'normal');
        } else if (state.wave === 3) {
            let originalWave1Multi = 1.05; 
            let nNormals = Math.floor(8 * originalWave1Multi) + 1;
            for(let i=0; i<nNormals; i++) state.zombiesToSpawn.push('normal');
        } else {
            let nNormals = Math.floor((5 + (state.wave * 2)) * waveMulti) + state.wave;
            let nDogs = Math.floor((state.wave >= 4 ? (3 + Math.floor(state.wave * 1.5)) : 0) * waveMulti);
            let nCrows = Math.floor((state.wave >= 5 ? state.wave : 0) * waveMulti);
            let nVultures = state.wave > 10 ? Math.floor(nCrows / 3) : 0;
            
            let bruteBase = (state.wave >= 7 ? Math.floor(state.wave / 3) : 0) * waveMulti;
            let extraBrutes = Math.floor(nNormals * (state.wave * 0.001)); 
            let nBrutes = Math.floor(bruteBase + extraBrutes);
            
            let nJousters = Math.floor((state.wave > 12 ? Math.floor(state.wave / 2) : 0) * waveMulti);

            for(let i=0; i<nNormals; i++) state.zombiesToSpawn.push('normal');
            for(let i=0; i<nDogs; i++) state.zombiesToSpawn.push('dog');
            for(let i=0; i<nCrows; i++) state.zombiesToSpawn.push('crow');
            for(let i=0; i<nVultures; i++) state.zombiesToSpawn.push('vulture');
            for(let i=0; i<nBrutes; i++) state.zombiesToSpawn.push('brute');
            for(let i=0; i<nJousters; i++) state.zombiesToSpawn.push('jouster');
        }

        state.zombiesToSpawn.sort(() => Math.random() - 0.5);
        
        let totalZombies = state.zombiesToSpawn.length;
        let baseDelay = 2.0 * Math.pow(0.97, state.wave);
        let maxPossibleTime = totalZombies * baseDelay * 1.5;

        // Condense wave if it exceeds 90 seconds (after wave 12)
        if (state.wave > 12 && maxPossibleTime > 90) {
            baseDelay = 90 / (totalZombies * 1.5);
        }
        state.waveBaseDelay = baseDelay;

        state.waveActive = true;
        state.spawnTimer = 1.0;
        updateUI();
    }

  function gameLoop() {
        if(state.isGameOver) return;

        const now = Date.now();
        const rawDt = Math.min((now - lastTime) / 1000, 0.1); 
        lastTime = now;
        
        const dt = state.paused ? 0 : rawDt * state.gameSpeed;
        if(!state.paused) {
            state.time += dt;
        }

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#2c3e50';
        if (state.paused && !state.perkMode && document.getElementById('tutorialOverlay').style.display !== 'block') ctx.fillStyle = '#1a252f'; 
        ctx.fillRect(0, 0, canvas.width, playableHeight);

          drawnRoads.forEach(r => {
            if (r.constructed) {
                drawPath(r.path, '#7f8c8d', 30);
            } else {
                drawPath(r.path, 'rgba(127, 140, 141, 0.4)', 30);
                let px = r.path[0].x, py = r.path[0].y;
                ctx.fillStyle = 'red'; ctx.fillRect(px - 15, py - 10, 30, 4);
                ctx.fillStyle = '#2ed573'; ctx.fillRect(px - 15, py - 10, 30 * (r.buildProgress / r.buildReq), 4);
            }
        });
        drawnTrenches.forEach(t => {
            if (t.constructed) {
                drawPath(t.path, '#3e2723', 30);
            } else {
                drawPath(t.path, 'rgba(62, 39, 35, 0.4)', 30);
                let px = t.path[0].x, py = t.path[0].y;
                ctx.fillStyle = 'red'; ctx.fillRect(px - 15, py - 10, 30, 4);
                ctx.fillStyle = '#2ed573'; ctx.fillRect(px - 15, py - 10, 30 * (t.buildProgress / t.buildReq), 4);
            }
        });
        if (state.mode === 'road' && state.currentPath.length > 0) drawPath(state.currentPath, 'rgba(127, 140, 141, 0.5)', 30);
        if (state.mode === 'trench' && state.currentPath.length > 0) drawPath(state.currentPath, 'rgba(62, 39, 35, 0.5)', 30);

  if (state.gameMode === 'classic') {
            const middlePlayable = playableHeight / 2;
            ctx.beginPath(); ctx.setLineDash([15, 15]); ctx.moveTo(0, middlePlayable); ctx.lineTo(canvas.width, middlePlayable);
            ctx.lineWidth = 2; ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)'; ctx.stroke(); ctx.setLineDash([]);
        } else if (state.gameMode === 'circle') {
            ctx.beginPath(); ctx.setLineDash([15, 15]); 
            ctx.arc(canvas.width/2, canvas.height/2, state.circleRadius, 0, Math.PI*2);
            ctx.lineWidth = 2; ctx.strokeStyle = state.circleSet ? 'rgba(255, 255, 255, 0.2)' : 'rgba(46, 204, 113, 0.8)'; 
            ctx.stroke(); ctx.setLineDash([]);
            
            ctx.beginPath(); ctx.arc(canvas.width/2, canvas.height/2, 40, 0, Math.PI*2);
            ctx.fillStyle = 'rgba(52, 152, 219, 0.2)'; ctx.fill();
            ctx.strokeStyle = 'rgba(52, 152, 219, 0.5)'; ctx.lineWidth = 2; ctx.stroke();
            ctx.fillStyle = '#fff'; ctx.font = '12px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText("CAMP", canvas.width/2, canvas.height/2);
        }

        if (!state.paused) {
            if (!state.waveActive) {
                state.waveDelay -= dt;
                if (state.waveDelay <= 0) {
                    if (state.wave > 0) {
                        let waveBonus = 1 + (upgradesData.waveEarnings ? upgradesData.waveEarnings.level * 0.20 : 0);
                        let baseCompleteBonus = state.wave * 10;
                        let actualBonus = Number((baseCompleteBonus * getCoinMultiplier() * waveBonus).toFixed(2));
                        state.coins = Number((state.coins + actualBonus).toFixed(2)); 
                        state.lastWaveIncome = Number(((state.lastWaveIncome || 0) + actualBonus).toFixed(2));
                        playSound('coin_pickup');
                    }
                    startNextWave();
                }
            } else {
                if (state.zombiesToSpawn.length > 0) {
                    state.spawnTimer -= dt;
                    if (state.spawnTimer <= 0) {
                        let zType = state.zombiesToSpawn.pop();
                        zombies.push(new Zombie(zType, state.wave));
                        
                        state.spawnTimer = state.waveBaseDelay * (0.5 + Math.random());
                    }
                } else if (zombies.length === 0) {
                    state.waveActive = false;
                    state.waveDelay = 30.0; 
                    state.lastWaveIncome = 0; 
                    playSound('wave_complete');
                }
            }

            if (Math.random() < (dt / 25.0) * player.perks.ammoSpawnMulti) ammoDrops.push(new AmmoDrop());
            if (Math.random() < (dt / 125.0) * player.perks.grenadeSpawnMulti) grenadeDrops.push(new GrenadeDrop());
            if (Math.random() < (dt / 125.0) * player.perks.coinSpawnMulti) coinDrops.push(new CoinDrop());

            buildings.forEach(b => { b.occupants = 0; if (b.type === 'Sparring') b.housedUnits = []; });
            player.update(dt);
            
            for (let i = projectiles.length - 1; i >= 0; i--) {
                let p = projectiles[i]; p.update(dt);
                if (!p.active) projectiles.splice(i, 1);
            }

            for (let i = floatingTexts.length - 1; i >= 0; i--) {
                let ft = floatingTexts[i]; ft.update(dt);
                if (ft.life <= 0) floatingTexts.splice(i, 1);
            }

            let totalInterestRate = 0;
            buildings.forEach(b => {
                b.update(dt);
                if (b.type === 'Bank' && b.constructed) {
                    let bankInterest = 1.0 + (upgradesData.bankInterest ? upgradesData.bankInterest.level * 0.1 : 0);
                    if (b.upgraded) {
                        bankInterest += 1.0;
                        b.discountTimer += dt;
                        if (b.discountTimer >= 30) {
                            b.discountTimer -= 30;
                            state.globalDiscount = (state.globalDiscount || 0) + 0.001;
                        }
                    }
                    totalInterestRate += bankInterest;
                }
            });
            if (totalInterestRate > 100) totalInterestRate = 100;
            let interestPerSec = totalInterestRate * 0.001;
            if (interestPerSec > 0) {
                state.coins += state.coins * interestPerSec * dt;
            }

            for (let i = units.length - 1; i >= 0; i--) {
                let u = units[i]; u.update(dt);
                if (u.hp <= 0) {
                    let inHospitalRange = false;
                    for (let b of buildings) {
                        if (b.type === 'Clinic' && b.upgraded && Math.hypot(u.x - b.x, u.y - b.y) < 130) {
                            inHospitalRange = true; break;
                        }
                    }
                    let zChance = u.type === 'Civilian' ? 0.5 : 0.25;
                    if (u.type === 'Civilian' && inHospitalRange) zChance = 0;

                    if (u.type !== 'Tank' && Math.random() < zChance) {
                        let z = new Zombie('normal', state.wave);
                        z.x = u.x; z.y = u.y;
                        zombies.push(z);
                    }
                    units.splice(i, 1);
                }
            }

            for (let i = zombies.length - 1; i >= 0; i--) {
                let z = zombies[i]; z.update(dt);

                if (state.gameMode === 'classic' && z.y > playableHeight) {
                    state.campHp -= z.damage; zombies.splice(i, 1); continue;
                } else if (state.gameMode === 'circle' && Math.hypot(z.x - canvas.width/2, z.y - canvas.height/2) < 40) {
                    state.campHp -= z.damage; zombies.splice(i, 1); continue;
                }

                for (let j = projectiles.length - 1; j >= 0; j--) {
                    let p = projectiles[j];
                    if (p.isEnemy) {
                        if (p.stats.type === 'flame') {
                            let targets = [player, ...units, ...buildings];
                            targets.forEach(t => {
                                let rad = t.radius || 20;
                                if (!p.hitZombies.has(t) && Math.hypot(p.x - t.x, p.y - t.y) < rad + (5 + (1 - p.life/p.maxLife)*20)) {
                                    p.hitZombies.add(t);
                                    t.hp -= p.dmg;
                                }
                            });
                        }
                        continue;
                    }

                     if (p.stats.type === 'flame') {
                        if (!p.hitZombies.has(z) && Math.hypot(p.x - z.x, p.y - z.y) < z.radius + (5 + (1 - p.life/p.maxLife)*20)) {
                            p.hitZombies.add(z);
                            let finalDmg = p.dmg;
                            let critProb = (p.owner === player ? player.perks.critChance : 0) + (upgradesData.critChance ? upgradesData.critChance.level * 0.01 : 0);
                            if (Math.random() < critProb) finalDmg *= 10;
                            
                            z.takeDamage(finalDmg);
                            floatingTexts.push(new FloatingText(z.x + (Math.random()*20-10), z.y - 10, `-${Math.floor(finalDmg)}`, '#e74c3c'));
                            if (z.hp <= 0 && !z.isThrown) {
                                handleZombieDeath(z, p.owner);
                                zombies.splice(i, 1); 
                                break;
                            }
                        }
                    } else if (p.stats.type !== 'rocket' && Math.hypot(p.x - z.x, p.y - z.y) < z.radius + 3) {
                        if (!p.hitZombies.has(z)) {
                            p.hitZombies.add(z);
                            let finalDmg = p.dmg;
                            let critProb = (p.owner === player ? player.perks.critChance : 0) + (upgradesData.critChance ? upgradesData.critChance.level * 0.01 : 0);
                            if (Math.random() < critProb) finalDmg *= 10;
                            
                            z.takeDamage(finalDmg); 
                            floatingTexts.push(new FloatingText(z.x + (Math.random()*20-10), z.y - 10, `-${Math.floor(finalDmg)}`, '#e74c3c'));
                            playSound('zombie_hit', 0.4, 50);
                            
                            let pierceUpgradeChance = upgradesData.pierce ? upgradesData.pierce.level * 0.01 : 0;
                            let ricochetUpgradeChance = upgradesData.ricochet ? upgradesData.ricochet.level * 0.01 : 0;
                            
                            let ownerPierce = (p.owner === player) ? player.perks.pierceChance : 0;
                            let ownerRicochet = (p.owner === player) ? player.perks.ricochetChance : 0;
                            
                            let willPierce = Math.random() < (ownerPierce + pierceUpgradeChance);
                            let willRicochet = !willPierce && Math.random() < (ownerRicochet + ricochetUpgradeChance);
                            
                            if (willPierce) {
                                p.dmg *= 0.5; 
                            } else if (willRicochet) {
                                p.dmg *= 0.5; 
                                let nextZ = null; let minD = Infinity;
                                zombies.forEach(nz => {
                                    if (nz !== z && nz.hp > 0 && !p.hitZombies.has(nz)) {
                                        let d = Math.hypot(p.x - nz.x, p.y - nz.y);
                                        if (d < minD && d < 200) { minD = d; nextZ = nz; }
                                    }
                                });
                                if (nextZ) {
                                    let angle = Math.atan2(nextZ.y - p.y, nextZ.x - p.x);
                                    let speed = Math.hypot(p.vx, p.vy);
                                    p.vx = Math.cos(angle) * speed;
                                    p.vy = Math.sin(angle) * speed;
                                } else {
                                    p.active = false;
                                }
                            } else {
                                p.active = false; 
                            }

                            if (z.hp <= 0 && !z.isThrown) { 
                                handleZombieDeath(z, p.owner);
                                zombies.splice(i, 1); 
                                break; 
                            }
                        }
                    }
                }
            }
            walls = walls.filter(w => w.hp > 0);
            buildings = buildings.filter(b => b.hp > 0);
        }

        ammoDrops.forEach(a => a.draw());
        grenadeDrops.forEach(g => g.draw());
        coinDrops.forEach(c => c.draw());

      walls.forEach(w => {
            ctx.beginPath(); ctx.arc(w.x, w.y, w.radius, 0, Math.PI*2);
            if (!w.constructed) {
                ctx.fillStyle = 'rgba(139, 69, 19, 0.4)';
                ctx.fill();
                ctx.lineWidth = 2; ctx.strokeStyle = 'rgba(0,0,0,0.4)'; ctx.stroke();
                ctx.fillStyle = 'red'; ctx.fillRect(w.x-8, w.y-w.radius-10, 16, 3);
                ctx.fillStyle = '#2ed573'; ctx.fillRect(w.x-8, w.y-w.radius-10, 16*(w.buildProgress/w.buildReq), 3);
            } else {
                if (w.upgraded) ctx.fillStyle = '#34495e';
                else if (w.isDoor) ctx.fillStyle = '#D2691E'; 
                else if (w.type === 'metal_wall') ctx.fillStyle = '#7f8c8d'; 
                else ctx.fillStyle = '#8B4513'; 
                ctx.fill(); 
                ctx.lineWidth = w.upgraded ? 3 : 2; 
                ctx.strokeStyle = w.upgraded ? '#bdc3c7' : '#000'; 
                ctx.stroke();
                if (w.hp < w.maxHp) {
                    ctx.fillStyle = 'red'; ctx.fillRect(w.x-8, w.y-w.radius-6, 16, 3);
                    ctx.fillStyle = '#2ed573'; ctx.fillRect(w.x-8, w.y-w.radius-6, 16*(w.hp/w.maxHp), 3);
                }
            }
        });

        if (state.mode === 'wooden_wall' || state.mode === 'metal_wall') {
            if(state.currentPath.length > 0) {
                drawPath(state.currentPath, state.mode === 'metal_wall' ? 'rgba(127, 140, 141, 0.5)' : 'rgba(139, 69, 19, 0.5)', 24);
            }
        }

        buildings.forEach(b => b.draw());
        units.forEach(u => u.draw());
        player.draw();
        zombies.forEach(z => z.draw());
        projectiles.forEach(p => p.draw());
        floatingTexts.forEach(ft => ft.draw());

     if (state.selectedBuilding || state.selectedWall) {
            let obj = state.selectedBuilding || state.selectedWall;
            let btnX = obj.x;
            let btnY = obj.y - obj.radius - 20;
            let btnW = 60, btnH = 20;
            let cost = state.selectedBuilding ? (getBuildingBaseCost(obj.type) * 2) : Math.floor(100 * player.perks.buildingCostMulti * getDiscountMultiplier());
            
            ctx.fillStyle = state.coins >= cost ? '#2ecc71' : '#e74c3c';
            ctx.fillRect(btnX - btnW/2, btnY - btnH/2, btnW, btnH);
            ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; ctx.strokeRect(btnX - btnW/2, btnY - btnH/2, btnW, btnH);
            
            ctx.fillStyle = '#fff';
            ctx.font = '10px sans-serif';
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(`UPG: 🪙${cost}`, btnX, btnY);

            if (obj.type === 'Sparring') {
                let expelY = btnY + btnH + 5;
                ctx.fillStyle = '#e67e22';
                ctx.fillRect(btnX - btnW/2, expelY - btnH/2, btnW, btnH);
                ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; ctx.strokeRect(btnX - btnW/2, expelY - btnH/2, btnW, btnH);
                ctx.fillStyle = '#fff';
                ctx.fillText("EXPEL", btnX, expelY);
            }
        }

        if (state.waveTextTimer > 0) {
            state.waveTextTimer -= rawDt;
            ctx.fillStyle = '#f1c40f'; ctx.font = 'bold 50px sans-serif'; ctx.textAlign = 'center';
            ctx.fillText(state.wave === 1 ? "WAVE 1" : `WAVE ${state.wave}`, canvas.width/2, playableHeight/2 - 20);
            
            if (state.lastWaveIncome > 0 && state.wave > 1) {
                ctx.fillStyle = '#2ecc71'; ctx.font = 'bold 24px sans-serif';
                ctx.fillText(`+${state.lastWaveIncome} Coins`, canvas.width/2, playableHeight/2 + 20);
            }
        } else if (!state.waveActive && state.waveDelay > 0) {
            ctx.fillStyle = '#f1c40f'; ctx.font = 'bold 30px sans-serif'; ctx.textAlign = 'center';
            ctx.fillText(state.wave === 0 ? "Prepare Defenses!" : `Wave ${state.wave+1} incoming in ${Math.ceil(state.waveDelay)}s`, canvas.width/2, playableHeight/2 - 20);
        }

        if (state.campHp <= 0 || player.hp <= 0) {
            if (!state.isGameOver) {
                state.isGameOver = true; updateUI();
                bgMusic.pause();
                playSound('game_over');
                document.getElementById('gameOverScreen').style.display = 'flex';
                logAction('GAME_OVER', { wave: state.wave, campHp: state.campHp, playerHp: player.hp });
                downloadLog();
            }
            return;
        }

        uiUpdateTimer += rawDt;
        if (uiUpdateTimer > 0.2) { updateUI(); uiUpdateTimer = 0; }

        requestAnimationFrame(gameLoop);
    }

    let skipMenu = false;
    try {
        if (sessionStorage.getItem('skipMenu') === 'true') {
            skipMenu = true;
            sessionStorage.removeItem('skipMenu');
        }
    } catch (e) {}

      window.onload = () => { 
        resize(); 
        renderWeaponStack();
        switchTab('upgrades'); 
        
        if (skipMenu) {
            startGame();
        } else {
            document.getElementById('mainMenu').style.display = 'flex';
            initMenuBackground();
        }
    };

    function initMenuBackground() {
        const menuCanvas = document.getElementById('menuBackground');
        if (!menuCanvas) return;
        const mctx = menuCanvas.getContext('2d');
        let mw = menuCanvas.width = window.innerWidth;
        let mh = menuCanvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            if (document.getElementById('mainMenu').style.display !== 'none') {
                mw = menuCanvas.width = window.innerWidth;
                mh = menuCanvas.height = window.innerHeight;
            }
        });

        // Generate the marching horde
        let menuZombies = [];
        for (let i = 0; i < 150; i++) {
            menuZombies.push({
                x: (Math.random() - 0.5) * 600, // Spread across the street width
                y: (Math.random() - 0.5) * 2000, // Spread along the street length
                speed: 0.8 + Math.random() * 1.2,
                offset: Math.random() * Math.PI * 2,
                color: Math.random() > 0.85 ? '#1e8449' : '#27ae60', // Mix in some brutes
                size: Math.random() > 0.85 ? 16 : 12
            });
        }

        function drawMenu() {
            if (document.getElementById('mainMenu').style.display === 'none') return; // Stop drawing when game starts
            
            // Clear background
            mctx.fillStyle = '#050505';
            mctx.fillRect(0, 0, mw, mh);
            
            mctx.save();
            mctx.translate(mw / 2, mh / 2);
            
            // Apply Isometric Transformation
            mctx.scale(1, 0.5);
            mctx.rotate(Math.PI / 4);
            
            // Draw Asphalt Street
            mctx.fillStyle = '#151515';
            mctx.fillRect(-350, -2000, 700, 4000);
            
            // Draw Sidewalks
            mctx.fillStyle = '#0a0a0a';
            mctx.fillRect(-450, -2000, 100, 4000);
            mctx.fillRect(350, -2000, 100, 4000);
            
            // Draw Street Center Lines
            mctx.strokeStyle = 'rgba(241, 196, 15, 0.3)';
            mctx.lineWidth = 15;
            mctx.setLineDash([80, 60]);
            mctx.beginPath();
            mctx.moveTo(0, -2000);
            mctx.lineTo(0, 2000);
            mctx.stroke();

            // Sort zombies by Y so they overlap correctly in 3D space
            menuZombies.sort((a, b) => a.y - b.y);
            
            // Update & Draw Zombies
            menuZombies.forEach(z => {
                z.y += z.speed; // Marching forward
                if (z.y > 1000) z.y = -1000 - Math.random() * 500; // Loop back to top
                
                let lurch = Math.sin(Date.now() / 150 + z.offset) * 6;
                
                // Zombie Shadow
                mctx.fillStyle = 'rgba(0,0,0,0.9)';
                mctx.beginPath();
                mctx.ellipse(z.x, z.y + z.size, z.size * 1.5, z.size * 0.8, 0, 0, Math.PI * 2);
                mctx.fill();
                
                // Zombie Body
                mctx.fillStyle = z.color;
                mctx.beginPath();
                mctx.arc(z.x + lurch, z.y, z.size, 0, Math.PI * 2);
                mctx.fill();
                
                // Zombie Outline
                mctx.lineWidth = 2;
                mctx.strokeStyle = '#000';
                mctx.stroke();
            });
            
            mctx.restore();
            
            // Draw Cinematic Fog / Vignette
            let grad = mctx.createRadialGradient(mw / 2, mh / 2, mh / 4, mw / 2, mh / 2, Math.max(mw, mh) / 1.1);
            grad.addColorStop(0, 'rgba(10, 15, 20, 0)');
            grad.addColorStop(1, 'rgba(5, 8, 12, 0.98)');
            mctx.fillStyle = grad;
            mctx.fillRect(0, 0, mw, mh);
            
            // Draw Subtle Scanlines
            mctx.fillStyle = 'rgba(0,0,0,0.15)';
            for (let i = 0; i < mh; i += 4) {
                mctx.fillRect(0, i, mw, 1);
            }
            
            requestAnimationFrame(drawMenu);
        }
        drawMenu();
    }
</script>
